name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npm run fetch:sidecars -- --target windows-x64,windows-arm64
      - run: node scripts/verify-sidecar-binaries.js prebuild:win:all
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run fetch:sidecars -- --target darwin-x64,darwin-arm64
      - run: node scripts/verify-sidecar-binaries.js prebuild:mac
      - run: npx electron-builder --mac --publish never
        env:
          # Roary Pet fork ships unsigned (no Apple Developer cert). Disable
          # signing auto-discovery so the build doesn't fail looking for a cert.
          CSC_IDENTITY_AUTODISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run fetch:sidecars -- --target linux-x64
      - run: node scripts/verify-sidecar-binaries.js prebuild:linux
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  release:
    # Wait for all builds, but only require macOS to succeed so a Windows/Linux
    # failure never blocks the macOS release. Whatever artifacts exist are attached.
    needs: [build-windows, build-mac, build-linux]
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.build-mac.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
